<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check List Veicular Diário</title>
    <link rel="icon" href="logo.webp" type="image/webp">
    <link rel="shortcut icon" href="logo.webp" type="image/webp">
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Preencha seu formulário</h1>
        <h2>Check List Veicular Diário</h2>

        <form id="form">

            <div class="form-row">
                <div class="form-col">
                    <label>1. Nome do motorista?</label>
                    <input type="text" name="motorista" placeholder="Digite o nome completo">
                </div>
                <div class="form-col">
                    <label>2. Qual a placa do veículo?</label>
                    <input type="text" name="placa" placeholder="Ex: ABC-1234">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>3. Documento do motorista?</label>
                    <input type="text" name="cpf" placeholder="Digite seu CPF ou RG">
                </div>
                <div class="form-col">
                    <label>4. Quantos KM rodados?</label>
                    <input type="text" name="km_rodados" placeholder="Digite o KM rodado">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>5. Pneus estão calibrados?</label>
                    <select name="pneus_calibrados">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>6. Pneus apresentam cortes, bolhas ou desgaste excessivo?</label>
                    <select name="pneus_danificados">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>7. Estepe está em boas condições?</label>
                    <select name="estepe_condicoes">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>8. Faróis estão funcionando?</label>
                    <select name="farol_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>9. Lanternas traseiras funcionando?</label>
                    <select name="lanternas_traseras">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>10. Luz de freio funcionando?</label>
                    <select name="luz_freio">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>11. Setas funcionando?</label>
                    <select name="setas_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>12. Luz de ré funcionando?</label>
                    <select name="luz_re">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>13. Vidros e retrovisores estão limpos?</label>
                    <select name="vidros_limpos">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>14. Há vazamento de óleo ou água no chão?</label>
                    <select name="vazamento">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>15. Nível do óleo do motor está correto?</label>
                    <select name="nivel_oleo">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>16. Nível da água do radiador está correto?</label>
                    <select name="nivel_agua">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>17. Nível do fluido de freio está correto?</label>
                    <select name="nivel_freio">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>18. Nível do fluido de direção está correto?</label>
                    <select name="nivel_direcao">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>19. Nível do limpador de para-brisa está correto?</label>
                    <select name="nivel_limpador">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>20. Bateria tem sinais de corrosão?</label>
                    <select name="bateria_corrosao">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>21. Motor funcionando sem ruídos?</label>
                    <select name="motor_ruidos">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>22. Freio estão funcionando?</label>
                    <select name="freio_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>23. Freio de mão funcionando?</label>
                    <select name="freio_mao">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>24. Embreagem está funcionado?</label>
                    <select name="embreagem_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>25. Direção está com folga?</label>
                    <select name="direcao_folga">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>26. Painel sem luz de alerta acesa?</label>
                    <select name="painel_alerta">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>27. Cinto de segurança está funcionando?</label>
                    <select name="cinto_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>28. Buzina está funcionando?</label>
                    <select name="buzina_funcionando">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>29. Limpador de para-brisa está normal?</label>
                    <select name="limpador_normal">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>30. Documento do veículo está em dia?</label>
                    <select name="documento_dia">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>31. CNH está válida?</label>
                    <select name="cnh_valida">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>32. CIP/CIPP está válida?</label>
                    <select name="cip_valida">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>33. Triângulo de segurança está presente?</label>
                    <select name="triangulo_presente">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>34. Macaco automotivo está presente?</label>
                    <select name="macaco_presente">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>35. Chave de roda está presente?</label>
                    <select name="chave_roda">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
                <div class="form-col">
                    <label>36. Extintor veicular está presente?</label>
                    <select name="extintor_presente">
                        <option value="">Selecione</option>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>37. Observação do motorista:</label>
                    <textarea name="relato" placeholder="Descreva qualquer ocorrência..."></textarea>
                </div>
                <div class="form-col">
                    <label>38. Anexar imagens do veículo:</label>
                    <input type="file" id="imagens" multiple accept="image/*">
                    <div id="preview" class="preview"></div>
                    <button type="button" class="btn-dark" onclick="removerTodas()">Remover todas imagens</button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label>39. Assinatura do motorista:</label>
                    <canvas id="signatureCanvas"></canvas>
                    <button type="button" class="btn-dark" onclick="limparAssinatura()">Limpar assinatura</button>
                </div>
            </div>

            <button type="button" class="btn-submit"><span>Enviar documento</span></button>

        </form>

    </div>
</div>

<form id="pdfForm" action="https://formsubmit.co/brunofercaitano@gmail.com" method="POST" enctype="multipart/form-data" target="invisible_iframe" style="display:none">
    <input type="hidden" name="_subject" value="Check List Veicular Diário">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="false">
    <input type="file" id="pdfInput" name="attachment">
</form>

<iframe name="invisible_iframe" style="display:none;"></iframe>
<div id="loader" class="loader hidden"></div>

<script src="functions.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="form.js"></script>

</body>
</html>
